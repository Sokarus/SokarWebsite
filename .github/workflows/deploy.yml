name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/dist

  deploy:
    name: Deploy to Production Server
    needs: [build-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Download frontend build artifacts
        uses: actions/download-artifact@v3
        with:
          name: frontend-build
          path: ./dist

      - name: Send build to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "./dist"
          target: "/tmp/sokar-build"

      - name: Send nginx config
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "nginx/prod/nginx.conf"
          target: "/tmp/nginx.conf"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            mkdir -p /var/www/sokar
            rm -rf /var/www/sokar/*
            cp -r /tmp/sokar-build/dist/* /var/www/sokar/
            rm -rf /tmp/sokar-build
            chown -R www-data:www-data /var/www/sokar
            chmod -R 755 /var/www/sokar

            cp /tmp/nginx.conf /etc/nginx/sites-available/sokar
            ln -sf /etc/nginx/sites-available/sokar /etc/nginx/sites-enabled/sokar
            rm -f /etc/nginx/sites-enabled/default
            nginx -t
            systemctl reload nginx