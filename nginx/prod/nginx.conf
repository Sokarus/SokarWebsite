server {
    listen 443 ssl;
    server_name sokar-music.com;

    ssl_certificate /etc/letsencrypt/live/sokar-music.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sokar-music.com/privkey.pem;

    root /var/www/sokar;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}